const categories = ["Animals", "Science", "Geography", "History", "Space", "Human Body", "Australia", "Sport & Games"];
let selectedCategory = null;
const selectedQuestionCount = 10;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;

const $ = id => document.getElementById(id);
const categoryScreen=$("categoryScreen"), gameScreen=$("gameScreen"), resultScreen=$("resultScreen");
const categoryGrid=$("categoryGrid");
const progressText=$("progressText"), statementText=$("statementText"), trueBtn=$("trueBtn"), falseBtn=$("falseBtn"), feedback=$("feedback"), nextBtn=$("nextBtn");
const scoreText=$("scoreText"), percentText=$("percentText"), resultCategoryText=$("resultCategoryText");

function showScreen(screen){[categoryScreen,gameScreen,resultScreen].forEach(s=>s.classList.remove("active"));screen.classList.add("active");}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function chooseCategory(cat){selectedCategory=cat;startGame();}
function buildMenus(){
  categories.forEach(cat=>{const b=document.createElement("button");b.className="category-btn";b.textContent=cat;b.onclick=()=>chooseCategory(cat);categoryGrid.appendChild(b);});
  counts.forEach(c=>{const b=document.createElement("button");b.className="question-count-btn";b.textContent=c;b.onclick=()=>{selectedQuestionCount=c;startGame();};questionCountGrid.appendChild(b);});
}
$("randomBtn").onclick=()=>chooseCategory(categories[Math.floor(Math.random()*categories.length)]);
$("everythingBtn").onclick=()=>chooseCategory("Everything");

function startGame(){
  let pool = selectedCategory==="Everything" ? statementBank : statementBank.filter(s=>s.category===selectedCategory);
  pool = shuffle(pool);
  currentQuestions = pool.slice(0, selectedQuestionCount);
  currentIndex=0;score=0;answered=false;
  showScreen(gameScreen);
  showQuestion();
}
function showQuestion(){
  answered=false;
  feedback.textContent="";
  feedback.className="feedback";
  nextBtn.style.display="none";
  trueBtn.disabled=false; falseBtn.disabled=false;
  const q=currentQuestions[currentIndex];
  progressText.textContent="Question "+(currentIndex+1)+" of 10";
  statementText.textContent=q.text;
}
function answer(choice){
  if(answered) return;
  answered=true;
  const q=currentQuestions[currentIndex];
  trueBtn.disabled=true; falseBtn.disabled=true;
  if(choice===q.answer){score++;feedback.textContent="Correct!";feedback.className="feedback correct";}
  else{feedback.textContent="Incorrect!";feedback.className="feedback incorrect";}
  nextBtn.textContent=currentIndex===currentQuestions.length-1 ? "Show Results" : "Next Question";
  nextBtn.style.display="inline-block";
}
trueBtn.onclick=()=>answer(true);
falseBtn.onclick=()=>answer(false);
nextBtn.onclick=()=>{currentIndex++; if(currentIndex>=currentQuestions.length) showResults(); else showQuestion();};
function showResults(){
  const percent = Math.round((score/currentQuestions.length)*100);
  scoreText.textContent=score+" / "+currentQuestions.length;
  percentText.textContent=percent+"% correct";
  resultCategoryText.textContent="Category: "+selectedCategory;
  showScreen(resultScreen);
}
$("playAgainBtn").onclick=()=>startGame();
$("settingsBtn").onclick=()=>showScreen(categoryScreen);
buildMenus();
