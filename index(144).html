<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gross Match - Bright Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@800&display=swap" rel="stylesheet">
<style>
:root{--navy:#061946;--blue:#0875f5;--purple:#7030d8;--yellow:#facc15;--green:#22c55e;--red:#ef174d;--orange:#f97316}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{font-family:'Fredoka',Arial,sans-serif;color:var(--navy);background:linear-gradient(180deg,#38bdf8 0%,#7dd3fc 45%,#d9f7ff 100%);overflow-x:hidden}
.sky-background{position:fixed;inset:0;z-index:-10;overflow:hidden;pointer-events:none;background:linear-gradient(180deg,#38bdf8 0%,#7dd3fc 45%,#d9f7ff 100%)}
.sky-background::before{content:"";position:absolute;top:36px;left:36px;width:110px;height:110px;border-radius:50%;background:#ffd60a;box-shadow:0 0 35px rgba(255,214,10,.75),0 0 75px rgba(255,214,10,.50),0 0 130px rgba(255,214,10,.28)}
.cloud{position:absolute;width:220px;height:74px;background:rgba(255,255,255,.88);border-radius:999px;opacity:.68;animation:cloudDrift linear infinite}
.cloud::before,.cloud::after{content:"";position:absolute;background:rgba(255,255,255,.96);border-radius:50%}
.cloud::before{width:92px;height:92px;left:32px;top:-38px}.cloud::after{width:118px;height:118px;right:24px;top:-58px}
.cloud.one{top:8%;left:-260px;transform:scale(.75);animation-duration:54s}.cloud.two{top:30%;left:-320px;transform:scale(1.15);animation-duration:72s;animation-delay:-20s}.cloud.three{top:66%;left:-280px;transform:scale(.9);animation-duration:64s;animation-delay:-36s}.cloud.four{top:48%;left:-350px;transform:scale(.55);animation-duration:82s;animation-delay:-12s;opacity:.45}.cloud.five{top:77%;left:-310px;transform:scale(1.05);animation-duration:94s;animation-delay:-44s;opacity:.38}
@keyframes cloudDrift{from{margin-left:-380px}to{margin-left:calc(100vw + 520px)}}
.side-menu{position:fixed;left:20px;top:50%;transform:translateY(-50%);width:170px;display:flex;flex-direction:column;gap:12px;z-index:20}
.side-menu a{background:white;color:#1f2937;text-decoration:none;font-weight:800;text-align:center;padding:12px 16px;border-radius:999px;border:3px solid #bfdbfe;box-shadow:0 6px 14px rgba(0,0,0,.15)}
.sidebar-logo-link{background:transparent!important;border:0!important;box-shadow:none!important;padding:0!important}
.sidebar-logo{width:170px;padding:16px 12px 18px;background:radial-gradient(circle at 25% 18%,rgba(255,255,255,.95) 0 12%,transparent 13%),linear-gradient(180deg,#ffffff 0%,#fff7d6 100%);border-radius:28px;box-shadow:0 7px 16px rgba(0,0,0,.16),0 7px 0 rgba(31,41,55,.10);transform:rotate(-1deg);overflow:hidden}
.sidebar-bright,.sidebar-arcade{display:flex;justify-content:center;align-items:center;white-space:nowrap}
.sidebar-bright span{font-family:"Baloo 2","Fredoka",Arial,sans-serif;font-weight:800;font-size:1.72rem;line-height:.9;color:var(--c);text-shadow:2px 2px 0 rgba(6,25,70,.16)}
.sidebar-arcade{margin-top:7px;font-family:"Baloo 2","Fredoka",Arial,sans-serif;font-weight:800;font-size:2rem;line-height:.82;color:#061946;text-shadow:2px 2px 0 rgba(6,25,70,.16)}
.game{width:min(1080px,100%);margin:0 auto;margin-left:220px;padding:24px 18px 46px}
.header{text-align:center;margin-bottom:18px}
.title-card{position:relative;width:min(940px,96%);min-height:168px;margin:0 auto;border:8px solid #061946;border-radius:50px;background:radial-gradient(circle at 16% 22%,rgba(255,255,255,.25) 0 13%,transparent 14%),radial-gradient(circle at 82% 78%,rgba(6,25,70,.15) 0 18%,transparent 19%),linear-gradient(110deg,#84cc16 0%,#facc15 35%,#f97316 65%,#ef174d 100%);box-shadow:0 16px 0 rgba(6,25,70,.96),0 28px 34px rgba(6,25,70,.26),inset 0 9px 0 rgba(255,255,255,.30),inset 0 -11px 0 rgba(6,25,70,.12);overflow:hidden;transform:rotate(-.6deg)}
.title-text{position:relative;z-index:5;min-height:168px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Baloo 2",Fredoka,Arial,sans-serif;font-weight:800;line-height:.82;letter-spacing:-3px;transform:rotate(.6deg)}
.title-text span{display:block;font-size:clamp(3.5rem,8vw,6.8rem);-webkit-text-stroke:5px #000;paint-order:stroke fill;text-shadow:0 8px 0 rgba(0,0,0,.28),0 15px 14px rgba(0,0,0,.20)}
.title-text .gross{color:#fff}.title-text .match{color:#fef08a}
.corner-gross{position:absolute;z-index:6;width:112px;height:96px;border:6px solid #061946;border-radius:34px;background:linear-gradient(145deg,#ffffff,#dcfce7);box-shadow:8px 9px 0 rgba(6,25,70,.24),inset 0 -8px 0 rgba(6,25,70,.12);display:flex;align-items:center;justify-content:center;font-size:3.5rem}
.corner-gross.left{left:34px;top:38px;transform:rotate(-8deg)}.corner-gross.right{right:34px;top:38px;transform:rotate(7deg)}
.subtitle{display:inline-block;margin:16px auto 0;background:white;border:3px solid white;border-radius:999px;padding:10px 18px;font-size:1.05rem;font-weight:800;color:#164e63}
.card{background:rgba(255,255,255,.96);border:5px solid white;border-radius:34px;padding:18px;box-shadow:0 18px 34px rgba(15,23,42,.20)}
.screen{display:none}.screen.active{display:block}
.instructions{text-align:center;max-width:820px;margin:0 auto 18px;color:#334155;font-size:1.08rem;line-height:1.5;font-weight:800}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:22px auto}
.choice{touch-action:manipulation;border:4px solid #bfdbfe;border-radius:24px;background:white;padding:22px 14px;font-size:1.2rem;font-weight:900;color:#1e3a8a;cursor:pointer;box-shadow:0 8px 0 #bfdbfe;transition:.12s}
.choice small{display:block;margin-top:5px;color:#64748b;font-weight:800}
.choice:hover,.choice.selected{background:#fef3c7;border-color:#facc15;box-shadow:0 8px 0 #facc15;transform:translateY(-3px) rotate(-1deg)}
button{touch-action:manipulation;border:0;border-radius:999px;padding:14px 22px;font-weight:900;font-size:1rem;cursor:pointer}
button:active{transform:scale(.97)}
.primary{background:#ef174d;color:white;font-size:1.15rem;padding:16px 30px;box-shadow:inset 0 -6px 0 rgba(0,0,0,.24),0 8px 0 rgba(6,25,70,.18)}
.secondary{background:#e2e8f0;color:#334155}
.actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:18px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.stat{background:#eff6ff;border:3px solid #bfdbfe;border-radius:18px;padding:12px;text-align:center;font-weight:900}
.stat-label{display:block;color:#64748b;font-size:.9rem;margin-bottom:4px}.stat-value{font-size:1.35rem;color:#1d4ed8}
.message{min-height:42px;display:flex;align-items:center;justify-content:center;text-align:center;background:#fef3c7;border:3px solid #facc15;border-radius:999px;padding:8px 16px;font-weight:900;color:#78350f;margin:8px auto 14px;max-width:760px}
.board{display:grid;gap:10px;max-width:900px;margin:0 auto;perspective:1200px}
.board.easy{grid-template-columns:repeat(4,1fr)}.board.medium{grid-template-columns:repeat(5,1fr)}.board.hard{grid-template-columns:repeat(6,1fr)}
.memory-card{position:relative;aspect-ratio:1/1;border:0;padding:0;background:transparent;border-radius:20px;cursor:pointer;transform-style:preserve-3d}
.memory-card .inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .32s cubic-bezier(.2,.8,.2,1)}
.memory-card.flipped .inner,.memory-card.matched .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid #061946;box-shadow:0 8px 0 rgba(6,25,70,.28),inset 0 -8px 0 rgba(6,25,70,.10)}
.back{background:radial-gradient(circle at 25% 20%,rgba(255,255,255,.42) 0 12%,transparent 13%),linear-gradient(145deg,#7030d8,#0875f5)}
.back::before{content:"?";font-family:"Baloo 2",Fredoka,Arial,sans-serif;font-size:clamp(2.8rem,8vw,5rem);color:#fff;-webkit-text-stroke:3px #061946;paint-order:stroke fill;text-shadow:0 5px 0 rgba(6,25,70,.25)}
.front{transform:rotateY(180deg);background:linear-gradient(145deg,#ffffff,#fef3c7)}
.gross-anim{
  position:relative;
  width:82%;
  height:78%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:2px;
}
.main-emoji{
  display:block;
  font-size:clamp(3rem,7.2vw,5.8rem);
  line-height:1;
  z-index:2;
  transform-origin:center;
}
.card-name{
  font-size:clamp(.72rem,1.6vw,1rem);
  color:#061946;
  font-weight:900;
  padding:0 4px;
  line-height:1.05;
}
.fx{
  position:absolute;
  pointer-events:none;
  z-index:3;
}
.memory-card.matched .front{background:linear-gradient(145deg,#dcfce7,#bbf7d0);border-color:#22c55e;animation:pop .35s ease}
@keyframes pop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.08)}100%{transform:rotateY(180deg) scale(1)}}
.results{text-align:center;background:linear-gradient(135deg,#ecfeff,#f5f3ff);border:4px solid #a5f3fc;border-radius:30px;padding:28px}
.results h2{font-family:"Baloo 2",Fredoka,Arial,sans-serif;font-size:clamp(2.6rem,7vw,5rem);margin:0;color:#5b21b6}
.result-details{font-size:1.2rem;font-weight:800;color:#475569;line-height:1.7;margin-top:12px}
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:100}
.confetti span{position:absolute;font-size:1.6rem;animation:confettiFall 1.2s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Gross Match animated card effects */
.memory-card.flipped .gross-sock .main-emoji,
.memory-card.matched .gross-sock .main-emoji{animation:sockWobble .9s infinite}
.gross-sock .fx1,.gross-sock .fx2,.gross-sock .fx3{
  width:10px;height:22px;border-radius:999px;background:rgba(34,197,94,.75);
  filter:blur(.5px);
  animation:stinkRise 1.15s infinite ease-out;
}
.gross-sock .fx1{left:16%;top:18%;animation-delay:0s}
.gross-sock .fx2{left:28%;top:10%;animation-delay:.25s}
.gross-sock .fx3{right:18%;top:14%;animation-delay:.5s}

.memory-card.flipped .gross-toilet .main-emoji,
.memory-card.matched .gross-toilet .main-emoji{animation:toiletShake .55s infinite}
.gross-toilet .fx1{
  width:54%;height:18%;left:23%;bottom:20%;border:4px solid rgba(56,189,248,.85);
  border-left-color:transparent;border-radius:50%;animation:flushSpin .8s linear infinite;
}
.gross-toilet .fx2{content:"";width:12px;height:12px;background:#38bdf8;border-radius:50%;right:23%;bottom:28%;animation:bubbleUp 1s infinite}
.gross-toilet .fx3{width:9px;height:9px;background:#60a5fa;border-radius:50%;left:26%;bottom:24%;animation:bubbleUp 1.1s infinite .28s}

.memory-card.flipped .gross-vomit .main-emoji,
.memory-card.matched .gross-vomit .main-emoji{animation:vomitBob .7s infinite}
.gross-vomit .fx1,.gross-vomit .fx2,.gross-vomit .fx3{
  background:#84cc16;border-radius:999px;bottom:6%;animation:dripDown .9s infinite ease-in;
}
.gross-vomit .fx1{width:12px;height:36px;left:42%;animation-delay:0s}
.gross-vomit .fx2{width:9px;height:28px;left:53%;animation-delay:.18s}
.gross-vomit .fx3{width:15px;height:22px;left:34%;animation-delay:.34s}

.memory-card.flipped .gross-underpants .main-emoji,
.memory-card.matched .gross-underpants .main-emoji{animation:undiesBounce .8s infinite}
.gross-underpants .fx1,.gross-underpants .fx2,.gross-underpants .fx3{
  width:8px;height:8px;background:#facc15;border-radius:50%;animation:stainPulse .9s infinite;
}
.gross-underpants .fx1{left:32%;top:56%}.gross-underpants .fx2{left:52%;top:48%;animation-delay:.2s}.gross-underpants .fx3{left:62%;top:62%;animation-delay:.4s}

.memory-card.flipped .gross-foot .main-emoji,
.memory-card.matched .gross-foot .main-emoji{animation:footWiggle .65s infinite}
.gross-foot .fx1,.gross-foot .fx2,.gross-foot .fx3{
  width:11px;height:24px;border-radius:999px;background:rgba(34,197,94,.72);animation:stinkRise 1.05s infinite ease-out;
}
.gross-foot .fx1{left:20%;top:14%}.gross-foot .fx2{left:38%;top:8%;animation-delay:.22s}.gross-foot .fx3{right:22%;top:12%;animation-delay:.45s}

.memory-card.flipped .gross-fly .main-emoji,
.memory-card.matched .gross-fly .main-emoji{animation:flyBuzz .18s infinite}
.gross-fly .fx1,.gross-fly .fx2{
  width:42%;height:30%;border:3px dashed rgba(6,25,70,.45);border-radius:50%;top:24%;animation:wingBlur .22s infinite;
}
.gross-fly .fx1{left:4%}.gross-fly .fx2{right:4%}
.gross-fly .fx3{font-size:1rem;right:8%;top:6%;animation:buzzText .55s infinite}
.gross-fly .fx3::before{content:"buzz"}

.memory-card.flipped .gross-cheese .main-emoji,
.memory-card.matched .gross-cheese .main-emoji{animation:cheeseSquish 1s infinite}
.gross-cheese .fx1,.gross-cheese .fx2,.gross-cheese .fx3{
  width:10px;height:24px;border-radius:999px;background:rgba(132,204,22,.76);animation:stinkRise 1.25s infinite ease-out;
}
.gross-cheese .fx1{left:18%;top:10%}.gross-cheese .fx2{left:48%;top:4%;animation-delay:.25s}.gross-cheese .fx3{right:16%;top:12%;animation-delay:.5s}

.memory-card.flipped .gross-worm .main-emoji,
.memory-card.matched .gross-worm .main-emoji{animation:wormWiggle .55s infinite}
.gross-worm .fx1,.gross-worm .fx2{
  height:4px;background:#92400e;border-radius:999px;bottom:17%;animation:dirtSlide .8s infinite;
}
.gross-worm .fx1{width:34%;left:18%}.gross-worm .fx2{width:26%;right:18%;animation-delay:.25s}
.gross-worm .fx3{width:8px;height:8px;background:#78350f;border-radius:50%;bottom:20%;left:45%;animation:dirtPop .7s infinite}

.memory-card.flipped .gross-booger .main-emoji,
.memory-card.matched .gross-booger .main-emoji{animation:noseSniff .65s infinite}
.gross-booger .fx1,.gross-booger .fx2{
  width:10px;background:#84cc16;border-radius:999px;top:54%;animation:snotRun 1.1s infinite ease-in;
}
.gross-booger .fx1{height:34px;left:47%}.gross-booger .fx2{height:24px;left:57%;animation-delay:.25s}
.gross-booger .fx3{width:18px;height:10px;background:#84cc16;border-radius:50%;left:50%;bottom:12%;animation:snotBlob .9s infinite}

.memory-card.flipped .gross-pig .main-emoji,
.memory-card.matched .gross-pig .main-emoji{animation:pigSnort .7s infinite}
.gross-pig .fx1,.gross-pig .fx2,.gross-pig .fx3{
  background:#92400e;border-radius:50%;animation:mudSplash .9s infinite;
}
.gross-pig .fx1{width:14px;height:10px;left:18%;bottom:20%}.gross-pig .fx2{width:10px;height:8px;right:22%;bottom:24%;animation-delay:.2s}.gross-pig .fx3{width:18px;height:9px;left:42%;bottom:12%;animation-delay:.4s}

.memory-card.flipped .gross-poo .main-emoji,
.memory-card.matched .gross-poo .main-emoji{animation:pooSquiggle .75s infinite}
.gross-poo .fx1,.gross-poo .fx2,.gross-poo .fx3{
  width:10px;height:24px;border-radius:999px;background:rgba(34,197,94,.72);animation:stinkRise 1.2s infinite ease-out;
}
.gross-poo .fx1{left:20%;top:10%}.gross-poo .fx2{left:48%;top:4%;animation-delay:.23s}.gross-poo .fx3{right:18%;top:12%;animation-delay:.48s}

.memory-card.flipped .gross-fart .main-emoji,
.memory-card.matched .gross-fart .main-emoji{animation:fartPuff .55s infinite}
.gross-fart .fx1,.gross-fart .fx2,.gross-fart .fx3{
  border:4px solid rgba(34,197,94,.72);border-radius:50%;animation:fartCloud 1s infinite ease-out;
}
.gross-fart .fx1{width:42px;height:28px;left:14%;top:28%}.gross-fart .fx2{width:36px;height:24px;right:18%;top:20%;animation-delay:.2s}.gross-fart .fx3{width:46px;height:30px;left:38%;bottom:12%;animation-delay:.4s}

.gross-golden-poo .main-emoji,.gross-mega-fart .main-emoji,.gross-legendary-sock .main-emoji,.gross-platinum-toilet .main-emoji{animation:rareGlow .7s infinite alternate}
.gross-golden-poo::after,.gross-mega-fart::after,.gross-legendary-sock::after,.gross-platinum-toilet::after{
  content:"✨";position:absolute;right:0;top:0;font-size:1.5rem;animation:sparkle 1s infinite;
}

@keyframes stinkRise{0%{transform:translateY(18px) scale(.55);opacity:0}35%{opacity:.85}100%{transform:translateY(-26px) scale(1.1);opacity:0}}
@keyframes sockWobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(6deg)}}
@keyframes toiletShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes flushSpin{to{transform:rotate(360deg)}}
@keyframes bubbleUp{0%{transform:translateY(10px) scale(.5);opacity:0}40%{opacity:1}100%{transform:translateY(-28px) scale(1);opacity:0}}
@keyframes vomitBob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@keyframes dripDown{0%{transform:translateY(-16px) scaleY(.4);opacity:.3}60%{opacity:1}100%{transform:translateY(18px) scaleY(1.1);opacity:0}}
@keyframes undiesBounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(3deg)}}
@keyframes stainPulse{0%,100%{transform:scale(.75);opacity:.55}50%{transform:scale(1.25);opacity:1}}
@keyframes footWiggle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(7deg)}}
@keyframes flyBuzz{0%,100%{transform:translate(0,0) rotate(-2deg)}25%{transform:translate(2px,-1px) rotate(3deg)}50%{transform:translate(-2px,1px) rotate(-3deg)}75%{transform:translate(1px,2px) rotate(2deg)}}
@keyframes wingBlur{0%,100%{opacity:.15;transform:scale(.9)}50%{opacity:.55;transform:scale(1.08)}}
@keyframes buzzText{0%,100%{opacity:.35;transform:rotate(-8deg)}50%{opacity:1;transform:rotate(8deg)}}
@keyframes cheeseSquish{0%,100%{transform:scale(1,1)}50%{transform:scale(1.08,.92)}}
@keyframes wormWiggle{0%,100%{transform:rotate(-7deg) scaleX(1)}50%{transform:rotate(7deg) scaleX(1.08)}}
@keyframes dirtSlide{0%{transform:translateX(-6px);opacity:.2}50%{opacity:.8}100%{transform:translateX(6px);opacity:.2}}
@keyframes dirtPop{0%,100%{transform:translateY(0) scale(.7);opacity:.3}50%{transform:translateY(-8px) scale(1.2);opacity:1}}
@keyframes noseSniff{0%,100%{transform:scale(1)}50%{transform:scale(1.08,.95)}}
@keyframes snotRun{0%{transform:translateY(-14px) scaleY(.35);opacity:.4}70%{opacity:1}100%{transform:translateY(18px) scaleY(1.2);opacity:0}}
@keyframes snotBlob{0%,100%{transform:scale(.7);opacity:.55}50%{transform:scale(1.2);opacity:1}}
@keyframes pigSnort{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(3px)}}
@keyframes mudSplash{0%{transform:translateY(8px) scale(.6);opacity:.3}50%{opacity:1}100%{transform:translateY(-14px) scale(1.15);opacity:0}}
@keyframes pooSquiggle{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(5deg) scale(1.06)}}
@keyframes fartPuff{0%,100%{transform:translateX(-3px) scale(.96)}50%{transform:translateX(4px) scale(1.05)}}
@keyframes fartCloud{0%{transform:scale(.45);opacity:.1}50%{opacity:.75}100%{transform:scale(1.35);opacity:0}}
@keyframes rareGlow{from{filter:drop-shadow(0 0 2px #facc15)}to{filter:drop-shadow(0 0 12px #facc15)}}
@keyframes sparkle{0%,100%{transform:scale(.8) rotate(0);opacity:.5}50%{transform:scale(1.25) rotate(20deg);opacity:1}}

@media(max-width:900px){.side-menu{position:static;transform:none;width:auto;flex-direction:row;justify-content:center;margin:12px auto}.sidebar-logo{display:none}.game{margin-left:auto;padding-top:10px}}
@media(max-width:720px){.mode-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr);gap:6px}.stat{padding:9px 5px;border-width:2px}.stat-label{font-size:.72rem}.stat-value{font-size:1rem}.board{gap:7px}.face{border-width:3px;border-radius:15px;box-shadow:0 5px 0 rgba(6,25,70,.28),inset 0 -5px 0 rgba(6,25,70,.10)}.corner-gross{transform:scale(.62)!important;top:42px!important}.corner-gross.left{left:0}.corner-gross.right{right:0}}
@media(max-width:520px){.game{padding:8px 8px 30px}.card{padding:10px;border-radius:24px}.title-card{min-height:138px;border-width:6px;border-radius:38px}.title-text{min-height:138px}.title-text span{font-size:clamp(2.75rem,13vw,4.7rem)}.subtitle{font-size:.92rem;padding:8px 13px}.board.hard{gap:5px}.card-name{font-size:.58rem;display:block}button{width:100%}}
</style>
</head>
<body>
<div class="sky-background" aria-hidden="true"><div class="cloud one"></div><div class="cloud two"></div><div class="cloud three"></div><div class="cloud four"></div><div class="cloud five"></div></div>
<nav class="side-menu"><a href="/" class="sidebar-logo-link" aria-label="Bright Arcade Home"><div class="sidebar-logo"><div class="sidebar-bright"><span style="--c:#ef174d;">B</span><span style="--c:#f97316;">R</span><span style="--c:#facc15;">I</span><span style="--c:#49c600;">G</span><span style="--c:#0875f5;">H</span><span style="--c:#7030d8;">T</span></div><div class="sidebar-arcade">ARCADE</div></div></a><a href="/">Home</a></nav>
<div class="game">
<header class="header"><div class="title-card"><div class="corner-gross left">💩</div><div class="title-text"><span class="gross">Gross</span><span class="match">Match</span></div><div class="corner-gross right">🤢</div></div><p class="subtitle">Flip the cards. Find the disgusting pairs.</p></header>
<main class="card">
<section class="screen active" id="startScreen">
<p class="instructions">A silly memory game full of stinky socks, toilets, boogers, farts and other gross surprises.</p>
<div class="mode-grid">
<button type="button" class="choice selected" data-level="easy">Easy<small>4 × 4 board</small></button>
<button type="button" class="choice" data-level="medium">Medium<small>5 × 4 board</small></button>
<button type="button" class="choice" data-level="hard">Hard<small>6 × 4 board</small></button>
</div>
<div class="actions"><button type="button" class="primary" id="startBtn">Start Game</button></div>
</section>
<section class="screen" id="gameScreen">
<div class="stats"><div class="stat"><span class="stat-label">Moves</span><span class="stat-value" id="movesText">0</span></div><div class="stat"><span class="stat-label">Pairs</span><span class="stat-value" id="pairsText">0 / 8</span></div><div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="timeText">0s</span></div></div>
<div class="message" id="message">Find the matching gross pairs.</div>
<div class="board easy" id="board"></div>
<div class="actions"><button type="button" class="secondary" id="restartBtn">Restart</button><button type="button" class="secondary" id="menuBtn">Back to Menu</button></div>
</section>
<section class="screen" id="resultScreen">
<div class="results"><h2>Gross Work!</h2><div class="result-details" id="resultDetails"></div></div>
<div class="actions"><button type="button" class="primary" id="playAgainBtn">Play Again</button><button type="button" class="secondary" id="chooseLevelBtn">Choose Level</button></div>
</section>
</main></div>
<div class="confetti" id="confetti"></div>
<script>
const cards=[
{id:"sock",emoji:"🧦",name:"Stinky Sock",msg:"That sock needs washing."},
{id:"toilet",emoji:"🚽",name:"Toilet",msg:"Please flush."},
{id:"vomit",emoji:"🤢",name:"Vomit",msg:"Absolutely disgusting."},
{id:"underpants",emoji:"🩲",name:"Underpants",msg:"Fresh pair acquired."},
{id:"foot",emoji:"🦶",name:"Smelly Foot",msg:"Phew! That's smelly."},
{id:"fly",emoji:"🪰",name:"Fly",msg:"Buzz off!"},
{id:"cheese",emoji:"🧀",name:"Smelly Cheese",msg:"That cheese has seen things."},
{id:"worm",emoji:"🪱",name:"Worm",msg:"Wiggle wiggle."},
{id:"booger",emoji:"👃",name:"Booger",msg:"Not in public."},
{id:"pig",emoji:"🐷",name:"Muddy Pig",msg:"Oink! Very muddy."},
{id:"poo",emoji:"💩",name:"Poo",msg:"Number two located."},
{id:"fart",emoji:"💨",name:"Fart",msg:"Who did that?"}
];
const rareCards=[
{id:"golden-poo",emoji:"💩",name:"Golden Poo",msg:"SPECIAL MATCH! Golden poo discovered!"},
{id:"mega-fart",emoji:"💨",name:"Mega Fart",msg:"SPECIAL MATCH! Mega fart unlocked!"},
{id:"legendary-sock",emoji:"🧦",name:"Legendary Sock",msg:"SPECIAL MATCH! Legendary stink!"},
{id:"platinum-toilet",emoji:"🚽",name:"Platinum Toilet",msg:"SPECIAL MATCH! Fancy flush!"}
];
const levels={easy:{pairs:8,boardClass:"easy",label:"4 × 4"},medium:{pairs:10,boardClass:"medium",label:"5 × 4"},hard:{pairs:12,boardClass:"hard",label:"6 × 4"}};
let level="easy",deck=[],flipped=[],matched=0,moves=0,locked=false,timer=null,startTime=0,elapsed=0;
const startScreen=document.getElementById("startScreen"),gameScreen=document.getElementById("gameScreen"),resultScreen=document.getElementById("resultScreen"),board=document.getElementById("board"),movesText=document.getElementById("movesText"),pairsText=document.getElementById("pairsText"),timeText=document.getElementById("timeText"),message=document.getElementById("message"),resultDetails=document.getElementById("resultDetails"),confetti=document.getElementById("confetti");
function showScreen(screen){startScreen.classList.remove("active");gameScreen.classList.remove("active");resultScreen.classList.remove("active");screen.classList.add("active")}
function shuffle(arr){const copy=arr.slice();for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function startGame(){clearInterval(timer);const config=levels[level];matched=0;moves=0;flipped=[];locked=false;elapsed=0;startTime=Date.now();let pool=shuffle(cards).slice(0,config.pairs);if(Math.random()<0.25){const rare=rareCards[Math.floor(Math.random()*rareCards.length)];pool[Math.floor(Math.random()*pool.length)]=rare}deck=shuffle([...pool,...pool].map((card,index)=>({...card,unique:index,matched:false})));board.className="board "+config.boardClass;board.innerHTML="";deck.forEach((card,index)=>{const btn=document.createElement("button");btn.type="button";btn.className="memory-card";btn.dataset.index=index;btn.innerHTML=`<div class="inner"><div class="face back"></div><div class="face front"><div class="gross-anim gross-${card.id}"><span class="main-emoji">${card.emoji}</span><span class="fx fx1"></span><span class="fx fx2"></span><span class="fx fx3"></span></div><div class="card-name">${card.name}</div></div></div>`;btn.addEventListener("click",()=>flipCard(index));board.appendChild(btn)});updateStats();message.textContent="Find the matching gross pairs.";timeText.textContent="0s";timer=setInterval(updateTimer,500);showScreen(gameScreen)}
function updateTimer(){elapsed=Math.floor((Date.now()-startTime)/1000);timeText.textContent=elapsed+"s"}
function updateStats(){movesText.textContent=moves;pairsText.textContent=matched+" / "+levels[level].pairs}
function flipCard(index){if(locked)return;const card=deck[index];if(card.matched)return;const el=board.children[index];if(el.classList.contains("flipped"))return;el.classList.add("flipped");flipped.push(index);if(flipped.length===2){moves++;updateStats();checkMatch()}}
function checkMatch(){const [a,b]=flipped;const cardA=deck[a],cardB=deck[b];if(cardA.id===cardB.id){cardA.matched=true;cardB.matched=true;board.children[a].classList.add("matched");board.children[b].classList.add("matched");matched++;message.textContent=cardA.msg;if(cardA.id.includes("golden")||cardA.id.includes("mega")||cardA.id.includes("legendary")||cardA.id.includes("platinum"))fireConfetti();flipped=[];updateStats();if(matched===levels[level].pairs)finishGame()}else{locked=true;message.textContent="No match. Try again.";setTimeout(()=>{board.children[a].classList.remove("flipped");board.children[b].classList.remove("flipped");flipped=[];locked=false;message.textContent="Find the matching gross pairs."},780)}}
function finishGame(){clearInterval(timer);updateTimer();fireConfetti();let rating="disgustingly good";if(moves<=levels[level].pairs+3)rating="gross genius";else if(moves<=levels[level].pairs+8)rating="seriously smelly";resultDetails.innerHTML=`You cleared the ${levels[level].label} board in <strong>${moves}</strong> moves and <strong>${elapsed}</strong> seconds.<br>Rating: <strong>${rating}</strong>.`;setTimeout(()=>showScreen(resultScreen),700)}
function fireConfetti(){confetti.innerHTML="";const bits=["💩","🤢","🧦","💨","✨","⭐"];for(let i=0;i<36;i++){const s=document.createElement("span");s.textContent=bits[Math.floor(Math.random()*bits.length)];s.style.left=Math.random()*100+"vw";s.style.animationDelay=Math.random()*0.25+"s";s.style.transform="translateY(-30px) rotate("+Math.random()*360+"deg)";confetti.appendChild(s)}setTimeout(()=>confetti.innerHTML="",1400)}
function backToMenu(){clearInterval(timer);showScreen(startScreen)}
document.querySelectorAll(".choice").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");level=btn.dataset.level})});
document.getElementById("startBtn").addEventListener("click",startGame);
document.getElementById("restartBtn").addEventListener("click",startGame);
document.getElementById("menuBtn").addEventListener("click",backToMenu);
document.getElementById("playAgainBtn").addEventListener("click",startGame);
document.getElementById("chooseLevelBtn").addEventListener("click",backToMenu);
</script>
</body>
</html>
