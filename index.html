<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Arcade</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#061946;
  --red:#ef174d;
  --orange:#f97316;
  --yellow:#facc15;
  --green:#49c600;
  --blue:#0875f5;
  --purple:#7030d8;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:'Fredoka', Arial, sans-serif;
  color:var(--navy);
  background:
    radial-gradient(circle at 8% 10%,rgba(255,255,255,.85) 0 5%,transparent 6%),
    radial-gradient(circle at 92% 10%,rgba(255,255,255,.75) 0 5%,transparent 6%),
    radial-gradient(circle at 18% 24%,#facc15 0 6px,transparent 7px),
    radial-gradient(circle at 82% 26%,#ec4899 0 5px,transparent 6px),
    linear-gradient(#48cfff 0%,#d9f7ff 34%,#fff3d0 34%,#fffaf0 100%);
  overflow-x:hidden;
}

.page{
  width:min(1180px,100%);
  margin:0 auto;
  padding:26px 18px 0;
}

/* NEW ANIMATED LOGO */

.hero{
  position:relative;
  text-align:center;
  margin-bottom:60px;
}

.logo{
  position:relative;
  display:inline-block;
  padding:12px 24px 16px;
  animation:logoFloat 3s ease-in-out infinite;
}

.logo::before{
  content:"";
  position:absolute;
  inset:12px 0 0;
  background:
    radial-gradient(circle at 25% 18%,rgba(255,255,255,.95) 0 12%,transparent 13%),
    linear-gradient(180deg,#ffffff 0%,#fff7d6 100%);
  border-radius:52px;
  z-index:-1;
  box-shadow:
    0 12px 0 rgba(6,25,70,.12),
    0 24px 32px rgba(6,25,70,.16);
  transform:rotate(-1deg);
}

@keyframes logoFloat{
  0%,100%{
    transform:translateY(0) rotate(-.5deg);
  }
  50%{
    transform:translateY(-8px) rotate(.5deg);
  }
}

.logo-line{
  display:block;
  white-space:nowrap;
  line-height:.82;
}

.logo-letter{
  display:inline-block;
  font-family:'Baloo 2','Fredoka',Arial,sans-serif;
  font-weight:800;
  font-size:clamp(3.5rem,9vw,8rem);
  letter-spacing:-2px;
  color:var(--c);
  transform:rotate(var(--r));
  animation:letterWiggle 2.2s ease-in-out infinite;
  animation-delay:var(--d);
  -webkit-text-stroke:2px white;
  paint-order:stroke fill;
  text-shadow:
    7px 7px 0 white,
    -7px 7px 0 white,
    7px -7px 0 white,
    -7px -7px 0 white,
    0 10px 0 rgba(6,25,70,.16),
    3px 16px 10px rgba(6,25,70,.18);
}

@keyframes letterWiggle{
  0%,100%{
    transform:rotate(var(--r)) translateY(0);
  }
  50%{
    transform:rotate(calc(var(--r) * -1)) translateY(-4px);
  }
}

.arcade .logo-letter{
  color:var(--navy);
  font-size:clamp(3.75rem,9.5vw,8.5rem);
  letter-spacing:-1px;
  -webkit-text-stroke:2px white;
}

.logo-sparkle{
  position:absolute;
  font-size:clamp(2rem,4vw,3.6rem);
  filter:drop-shadow(4px 5px 0 white) drop-shadow(0 8px 0 rgba(6,25,70,.12));
  animation:sparkleBob 1.7s ease-in-out infinite;
}

.logo-sparkle.one{
  left:-48px;
  top:35%;
}

.logo-sparkle.two{
  right:-50px;
  top:20%;
  animation-delay:.3s;
}

.logo-sparkle.three{
  left:48%;
  bottom:-26px;
  font-size:2.2rem;
  animation-delay:.6s;
}

@keyframes sparkleBob{
  0%,100%{
    transform:translateY(0) rotate(-8deg) scale(1);
  }
  50%{
    transform:translateY(-10px) rotate(8deg) scale(1.1);
  }
}

/* GAME CARDS */

.games{
  display:grid;
  grid-template-columns:repeat(2,minmax(280px,1fr));
  gap:28px;
}

.game-card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:white;
  border:5px solid white;
  border-radius:34px;
  overflow:hidden;
  box-shadow:0 18px 34px rgba(15,23,42,.22);
  transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
}

.game-card:hover{
  transform:translateY(-9px) scale(1.02);
  box-shadow:0 28px 48px rgba(15,23,42,.30);
  filter:saturate(1.12);
}

.poster{
  height:280px;
  position:relative;
  overflow:hidden;
}

.speed .poster{
  background:linear-gradient(135deg,#4c1d95,#7c3aed);
}

.silly .poster{
  background:linear-gradient(135deg,#15803d,#22c55e);
}

.sparkles{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 10% 18%,#fff7ad 0 5px,transparent 6px),
    radial-gradient(circle at 42% 12%,#facc15 0 7px,transparent 8px),
    radial-gradient(circle at 84% 16%,#ec4899 0 5px,transparent 6px),
    radial-gradient(circle at 25% 78%,#e9d5ff 0 5px,transparent 6px),
    radial-gradient(circle at 66% 80%,#38bdf8 0 5px,transparent 6px);
  opacity:.9;
}

.game-card:hover .sparkles{
  animation:sparkleMove .6s linear infinite;
}

@keyframes sparkleMove{
  from{transform:translateY(-8px)}
  to{transform:translateY(16px)}
}

.card-title{
  position:absolute;
  right:24px;
  top:68px;
  z-index:5;
  color:white;
  font-size:clamp(2.7rem,5.3vw,4.5rem);
  font-weight:700;
  line-height:.88;
  letter-spacing:-2px;
  text-shadow:
    5px 5px 0 rgba(6,25,70,.78),
    -2px 2px 0 rgba(6,25,70,.55),
    0 8px 0 rgba(6,25,70,.16);
}

.card-title span{
  display:block;
  color:#facc15;
}

.lightning{
  position:absolute;
  left:42px;
  top:42px;
  width:130px;
  height:198px;
  z-index:4;
  background:linear-gradient(135deg,#fff047,#ffae00);
  clip-path:polygon(47% 0,92% 0,64% 38%,100% 38%,29% 100%,47% 55%,4% 55%);
  filter:drop-shadow(9px 10px 0 rgba(6,25,70,.35));
}

.lightning::before{
  content:"";
  position:absolute;
  left:35px;
  top:63px;
  width:14px;
  height:14px;
  background:#061946;
  border-radius:50%;
  box-shadow:36px 0 0 #061946;
}

.lightning::after{
  content:"";
  position:absolute;
  left:41px;
  top:85px;
  width:36px;
  height:23px;
  background:#ef4444;
  border:4px solid #061946;
  border-radius:0 0 50px 50px;
}

.game-card:hover .lightning{
  animation:zap .38s ease-in-out infinite alternate;
}

@keyframes zap{
  from{transform:translateY(0) rotate(-3deg)}
  to{transform:translateY(-11px) rotate(5deg) scale(1.06)}
}

.speed-lines{
  position:absolute;
  left:-28px;
  bottom:50px;
  width:220px;
  height:100px;
  background:repeating-linear-gradient(-25deg,rgba(255,255,255,.50) 0 11px,transparent 11px 31px);
  opacity:.58;
  transform:skewX(-12deg);
}

.game-card:hover .speed-lines{
  animation:speedLines .35s linear infinite;
}

@keyframes speedLines{
  from{background-position:0 0}
  to{background-position:31px 0}
}

.monster{
  position:absolute;
  left:46px;
  top:78px;
  width:126px;
  height:144px;
  z-index:4;
  background:linear-gradient(135deg,#b15cff,#7422c7);
  border:6px solid #061946;
  border-radius:46% 46% 38% 38%;
  box-shadow:9px 10px 0 rgba(6,25,70,.28);
}

.monster::before{
  content:"";
  position:absolute;
  left:26px;
  top:28px;
  width:17px;
  height:17px;
  background:white;
  border:4px solid #061946;
  border-radius:50%;
  box-shadow:44px 0 0 white,44px 0 0 4px #061946;
}

.monster::after{
  content:"";
  position:absolute;
  left:35px;
  top:82px;
  width:55px;
  height:31px;
  background:#ef4444;
  border:4px solid #061946;
  border-radius:0 0 50px 50px;
}

.game-card:hover .monster{
  animation:monsterBounce .38s ease-in-out infinite alternate;
}

@keyframes monsterBounce{
  from{transform:translateY(0) rotate(-4deg)}
  to{transform:translateY(-10px) rotate(6deg)}
}

.chicken{
  position:absolute;
  right:34px;
  top:32px;
  width:94px;
  height:106px;
  z-index:4;
  background:white;
  border:5px solid #061946;
  border-radius:50% 50% 42% 42%;
  box-shadow:8px 9px 0 rgba(6,25,70,.24);
}

.chicken::before{
  content:"";
  position:absolute;
  left:28px;
  top:-19px;
  width:33px;
  height:29px;
  background:#ef4444;
  border:4px solid #061946;
  border-radius:50% 50% 0 0;
}

.chicken::after{
  content:"";
  position:absolute;
  left:19px;
  top:38px;
  width:12px;
  height:12px;
  background:#061946;
  border-radius:50%;
  box-shadow:36px 0 0 #061946;
}

.beak{
  position:absolute;
  left:39px;
  top:56px;
  width:0;
  height:0;
  border-top:10px solid transparent;
  border-bottom:10px solid transparent;
  border-left:20px solid #f59e0b;
}

.game-card:hover .chicken{
  animation:chickenFlap .34s ease-in-out infinite alternate;
}

@keyframes chickenFlap{
  from{transform:rotate(-5deg) translateY(0)}
  to{transform:rotate(7deg) translateY(-10px)}
}

.speech{
  position:absolute;
  right:120px;
  top:24px;
  z-index:5;
  background:white;
  color:#a21caf;
  border:4px solid #061946;
  border-radius:50%;
  box-shadow:5px 6px 0 rgba(6,25,70,.20);
  padding:12px 16px;
  font-size:1.15rem;
  font-weight:700;
}

.game-card:hover .speech{
  animation:speechShake .22s ease-in-out infinite alternate;
}

@keyframes speechShake{
  from{transform:rotate(-7deg)}
  to{transform:rotate(7deg)}
}

.card-bottom{
  background:white;
  padding:22px 26px 26px;
  text-align:center;
}

.card-bottom p{
  margin:0 0 18px;
  font-size:1.22rem;
  font-weight:700;
  line-height:1.3;
}

.play{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:min(400px,100%);
  padding:15px 22px;
  border-radius:999px;
  color:white;
  font-size:1.25rem;
  font-weight:700;
  box-shadow:inset 0 -6px 0 rgba(0,0,0,.24),0 8px 0 rgba(6,25,70,.18);
}

.speed .play{background:#6d28d9}
.silly .play{background:#139b37}

.free-strip{
  margin:26px auto 18px;
  max-width:1040px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  background:#fff7d6;
  border:3px solid #fde68a;
  border-radius:22px;
  padding:15px 26px;
  box-shadow:0 10px 22px rgba(15,23,42,.11);
}

.free-left{
  display:flex;
  align-items:center;
  gap:16px;
}

.free-star{
  font-size:2.8rem;
  animation:starBounce 1.4s ease-in-out infinite;
}

@keyframes starBounce{
  0%,100%{transform:translateY(0) rotate(-5deg)}
  50%{transform:translateY(-8px) rotate(7deg)}
}

.free-strip strong{
  display:block;
  font-size:1.3rem;
}

.free-strip span{
  color:#334155;
  font-weight:600;
}

.rainbow{
  font-size:3.3rem;
}

footer{
  background:#061946;
  color:white;
  margin:0 -18px;
  padding:18px;
  text-align:center;
  font-weight:700;
}

footer span{
  color:#f9a8d4;
}


/* 3D CHARACTER UPGRADE */
.lightning{
  background:
    radial-gradient(circle at 32% 22%,rgba(255,255,255,.95) 0 8%,transparent 9%),
    linear-gradient(145deg,#fff86a 0%,#ffd326 34%,#ff9900 72%,#d97706 100%) !important;
  filter:
    drop-shadow(10px 12px 0 rgba(6,25,70,.30))
    drop-shadow(0 16px 18px rgba(0,0,0,.24)) !important;
}

.lightning::before{
  background:#061946 !important;
  box-shadow:
    36px 0 0 #061946,
    2px 3px 0 rgba(255,255,255,.55),
    38px 3px 0 rgba(255,255,255,.55) !important;
}

.lightning::after{
  background:
    radial-gradient(circle at 50% 35%,#ff9aa2 0 20%,#ef4444 21% 100%) !important;
  box-shadow:inset 0 -6px 0 rgba(127,29,29,.28);
}

.monster{
  background:
    radial-gradient(circle at 34% 22%,rgba(255,255,255,.55) 0 10%,transparent 11%),
    radial-gradient(circle at 72% 80%,rgba(39,0,93,.40) 0 22%,transparent 23%),
    linear-gradient(145deg,#d8b4fe 0%,#a855f7 38%,#6d28d9 78%,#4c1d95 100%) !important;
  box-shadow:
    9px 10px 0 rgba(6,25,70,.25),
    inset -12px -16px 0 rgba(76,29,149,.35),
    inset 10px 8px 0 rgba(255,255,255,.25) !important;
}

.monster::before{
  background:
    radial-gradient(circle at 35% 35%,white 0 35%,#dbeafe 36% 100%) !important;
  box-shadow:
    44px 0 0 white,
    44px 0 0 4px #061946,
    4px 4px 0 rgba(6,25,70,.18),
    48px 4px 0 rgba(6,25,70,.18) !important;
}

.monster::after{
  background:
    radial-gradient(circle at 50% 20%,#fb7185 0 22%,#ef4444 23% 100%) !important;
  box-shadow:inset 0 -7px 0 rgba(127,29,29,.30);
}

.chicken{
  background:
    radial-gradient(circle at 35% 22%,#ffffff 0 18%,transparent 19%),
    linear-gradient(145deg,#ffffff 0%,#f8fafc 48%,#e2e8f0 100%) !important;
  box-shadow:
    8px 9px 0 rgba(6,25,70,.22),
    inset -9px -13px 0 rgba(148,163,184,.22),
    inset 8px 7px 0 rgba(255,255,255,.65) !important;
}

.chicken::before{
  background:
    radial-gradient(circle at 35% 25%,#fecaca 0 18%,transparent 19%),
    linear-gradient(145deg,#fb7185,#dc2626) !important;
  box-shadow:inset -4px -5px 0 rgba(127,29,29,.25);
}

.chicken::after{
  background:#061946 !important;
  box-shadow:
    36px 0 0 #061946,
    2px 3px 0 rgba(255,255,255,.65),
    38px 3px 0 rgba(255,255,255,.65) !important;
}

.beak{
  filter:drop-shadow(2px 3px 0 rgba(6,25,70,.25));
}

.speech{
  background:
    radial-gradient(circle at 30% 22%,#ffffff 0 14%,transparent 15%),
    linear-gradient(145deg,#ffffff,#fef3c7) !important;
  box-shadow:
    5px 6px 0 rgba(6,25,70,.18),
    inset -5px -6px 0 rgba(251,191,36,.18) !important;
}

.card-title{
  text-shadow:
    5px 5px 0 rgba(6,25,70,.78),
    -2px 2px 0 rgba(6,25,70,.55),
    0 8px 0 rgba(6,25,70,.16),
    0 14px 16px rgba(0,0,0,.22) !important;
}

.poster::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 24% 16%,rgba(255,255,255,.18) 0 15%,transparent 16%),
    radial-gradient(circle at 72% 88%,rgba(0,0,0,.12) 0 18%,transparent 19%);
  z-index:1;
}

.lightning,
.monster,
.chicken,
.speech,
.card-title{
  z-index:5;
}


@media(max-width:850px){
  .games{
    grid-template-columns:1fr;
  }
}

@media(max-width:620px){
  .logo-sparkle{
    display:none;
  }
}

@media(max-width:560px){
  .page{
    padding:16px 10px 0;
  }

  .logo{
    padding:12px 12px 18px;
  }

  .logo::before{
    border-radius:30px;
  }

  .logo-letter{
    font-size:clamp(3rem,17vw,5rem);
    letter-spacing:-2px;
    text-shadow:
      3px 3px 0 white,
      -3px 3px 0 white,
      3px -3px 0 white,
      -3px -3px 0 white,
      0 7px 0 rgba(6,25,70,.18);
  }

  .arcade .logo-letter{
    font-size:clamp(3.2rem,18vw,5.3rem);
    letter-spacing:-2px;
  }

  .poster{
    height:260px;
  }

  .card-title{
    right:18px;
    top:76px;
    font-size:clamp(2.4rem,12vw,3.8rem);
  }

  .lightning{
    left:26px;
    top:68px;
    width:98px;
    height:152px;
  }

  .lightning::before{
    left:27px;
    top:49px;
    width:11px;
    height:11px;
    box-shadow:29px 0 0 #061946;
  }

  .lightning::after{
    left:31px;
    top:67px;
    width:30px;
    height:19px;
  }

  .monster{
    left:24px;
    top:94px;
    width:98px;
    height:116px;
  }

  .monster::before{
    left:20px;
    top:24px;
    width:14px;
    height:14px;
    box-shadow:37px 0 0 white,37px 0 0 4px #061946;
  }

  .monster::after{
    left:28px;
    top:70px;
    width:45px;
    height:24px;
  }

  .chicken{
    display:none;
  }

  .speech{
    right:18px;
    top:18px;
    font-size:1rem;
  }

  .free-strip{
    padding:14px;
    align-items:flex-start;
  }

  .rainbow{
    display:none;
  }

  footer{
    margin:0 -10px;
  }
}
</style>
</head>

<body>
<main class="page">

  <header class="hero">
    <div class="logo">
      <span class="logo-sparkle one">⭐</span>
      <span class="logo-sparkle two">💡</span>
      <span class="logo-sparkle three">✨</span>

      <span class="logo-line bright">
        <span class="logo-letter" style="--c:var(--red);--r:-2deg;--d:0s;">B</span>
        <span class="logo-letter" style="--c:var(--orange);--r:2deg;--d:.1s;">R</span>
        <span class="logo-letter" style="--c:var(--yellow);--r:-2deg;--d:.2s;">I</span>
        <span class="logo-letter" style="--c:var(--green);--r:3deg;--d:.3s;">G</span>
        <span class="logo-letter" style="--c:var(--blue);--r:-2deg;--d:.4s;">H</span>
        <span class="logo-letter" style="--c:var(--purple);--r:3deg;--d:.5s;">T</span>
      </span>

      <span class="logo-line arcade">
        <span class="logo-letter" style="--r:-2deg;--d:.1s;">A</span>
        <span class="logo-letter" style="--r:2deg;--d:.2s;">R</span>
        <span class="logo-letter" style="--r:-2deg;--d:.3s;">C</span>
        <span class="logo-letter" style="--r:2deg;--d:.4s;">A</span>
        <span class="logo-letter" style="--r:-2deg;--d:.5s;">D</span>
        <span class="logo-letter" style="--r:3deg;--d:.6s;">E</span>
      </span>
    </div>
  </header>

  <section class="games">
    <a class="game-card speed" href="./speed-typer/index.html">
      <div class="poster">
        <div class="sparkles"></div>
        <div class="speed-lines"></div>
        <div class="lightning"></div>
        <div class="card-title">SPEED <span>TYPER</span></div>
      </div>
      <div class="card-bottom">
        <p>Test your typing speed and beat your best score!</p>
        <div class="play">Play Speed Typer →</div>
      </div>
    </a>

    <a class="game-card silly" href="./silly-sentences/index.html">
      <div class="poster">
        <div class="sparkles"></div>
        <div class="speech">HA<br>HA!</div>
        <div class="monster"></div>
        <div class="chicken"><div class="beak"></div></div>
        <div class="card-title">SILLY <span>SENTENCES</span></div>
      </div>
      <div class="card-bottom">
        <p>Type silly sentences and chase the funniest score!</p>
        <div class="play">Play Silly Sentences →</div>
      </div>
    </a>
  </section>

  <section class="free-strip">
    <div class="free-left">
      <div class="free-star">⭐</div>
      <div>
        <strong>All games are free to play!</strong>
        <span>No sign up. No downloads. Just click and play.</span>
      </div>
    </div>
    <div class="rainbow">🌈</div>
  </section>
</main>
</body>
</html>
