<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bright Arcade</title>
<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 8% 10%,rgba(255,255,255,.9) 0 5%,transparent 6%),
    radial-gradient(circle at 92% 15%,rgba(255,255,255,.75) 0 5%,transparent 6%),
    linear-gradient(#45c9ff 0%, #dff7ff 34%, #fff5cf 34%, #fffaf0 100%);
  overflow-x:hidden;
}

.page{
  width:min(100%, 1500px);
  margin:0 auto;
  padding:0 18px;
}

.header-art{
  width:100%;
  display:block;
  max-width:1500px;
  margin:0 auto 12px;
  animation:gentleFloat 3s ease-in-out infinite;
  transform-origin:center;
}

@keyframes gentleFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

.games{
  display:grid;
  grid-template-columns:repeat(2, minmax(280px, 1fr));
  gap:28px;
  align-items:start;
}

.game-link{
  display:block;
  text-decoration:none;
  border-radius:32px;
  overflow:hidden;
  position:relative;
  box-shadow:0 18px 34px rgba(15,23,42,.22);
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  background:white;
}

.game-link img{
  display:block;
  width:100%;
  height:auto;
}

.game-link:hover{
  transform:translateY(-10px) scale(1.025) rotate(-0.7deg);
  box-shadow:0 30px 54px rgba(15,23,42,.30);
  filter:saturate(1.12) brightness(1.03);
}

.game-link::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.75) 0 5px, transparent 6px),
    radial-gradient(circle at 70% 15%, rgba(250,204,21,.8) 0 6px, transparent 7px),
    radial-gradient(circle at 88% 42%, rgba(236,72,153,.75) 0 5px, transparent 6px),
    radial-gradient(circle at 42% 82%, rgba(56,189,248,.75) 0 6px, transparent 7px);
}

.game-link:hover::after{
  opacity:.9;
  animation:sparkles .55s linear infinite;
}

@keyframes sparkles{
  from{transform:translateY(-10px)}
  to{transform:translateY(16px)}
}

.game-link:focus{
  outline:6px solid #facc15;
  outline-offset:5px;
}

.free-strip{
  display:block;
  width:min(100%, 1232px);
  margin:24px auto 12px;
  border-radius:18px;
  box-shadow:0 10px 20px rgba(15,23,42,.12);
}

.footer-art{
  display:block;
  width:calc(100% + 36px);
  margin:0 -18px;
}

@media(max-width:800px){
  .page{
    padding:0 10px;
  }

  .games{
    grid-template-columns:1fr;
    gap:18px;
  }

  .game-link{
    border-radius:24px;
  }

  .header-art{
    width:125%;
    max-width:none;
    margin-left:-12.5%;
    margin-bottom:4px;
  }

  .footer-art{
    width:calc(100% + 20px);
    margin:0 -10px;
  }
}

@media(max-width:480px){
  .header-art{
    width:145%;
    margin-left:-22.5%;
  }

  .game-link:hover{
    transform:none;
  }
}
</style>
</head>
<body>
  <main class="page">
    <img class="header-art" src="assets/header.png" alt="Bright Arcade">

    <section class="games" aria-label="Bright Arcade games">
      <a class="game-link" href="./speed-typer/index.html" aria-label="Play Speed Typer">
        <img src="assets/speed-card.png" alt="Speed Typer">
      </a>

      <a class="game-link" href="./silly-sentences/index.html" aria-label="Play Silly Sentences">
        <img src="assets/silly-card.png" alt="Silly Sentences">
      </a>
    </section>

    <img class="free-strip" src="assets/free-strip.png" alt="All games are free to play. No sign up. No downloads. Just click and play.">
    <img class="footer-art" src="assets/footer.png" alt="Bright Arcade footer">
  </main>
</body>
</html>
