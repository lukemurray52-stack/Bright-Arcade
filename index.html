<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Arcade</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#7ed3ff;
    font-family:Arial,sans-serif;
}

.wrapper{
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    position:relative;
    max-width:1200px;
    width:100%;
}

.container img{
    width:100%;
    display:block;
    border-radius:20px;
}

.hotspot{
    position:absolute;
    display:block;
    border-radius:25px;
    transition:all .2s ease;
}

.hotspot:hover{
    transform:scale(1.03);
    box-shadow:0 0 0 6px rgba(255,255,255,.4);
}

.speed{
    left:2%;
    top:34%;
    width:46%;
    height:48%;
}

.silly{
    right:2%;
    top:34%;
    width:46%;
    height:48%;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="container">

        <img src="bright-arcade-homepage.png" alt="Bright Arcade">

        <a class="hotspot speed"
           href="./speed-typer/">
        </a>

        <a class="hotspot silly"
           href="./silly-sentences/">
        </a>

    </div>

</div>

</body>
</html>
