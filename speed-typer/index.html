<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Speed Typer</title>
<style>
:root{--blue:#2563eb;--red:#ef4444;--yellow:#facc15;--green:#22c55e;--purple:#a855f7;--ink:#1f2937}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at 8% 10%,rgba(250,204,21,.42) 0 18%,transparent 34%),radial-gradient(circle at 92% 8%,rgba(37,99,235,.30) 0 18%,transparent 36%),radial-gradient(circle at 8% 88%,rgba(34,197,94,.24) 0 18%,transparent 36%),radial-gradient(circle at 92% 86%,rgba(239,68,68,.26) 0 20%,transparent 38%),radial-gradient(circle at 52% 42%,rgba(168,85,247,.16) 0 14%,transparent 32%),linear-gradient(135deg,#fffaf0 0%,#f8fafc 48%,#eff6ff 100%);color:var(--ink);min-height:100vh;padding:24px}
.game{max-width:1050px;margin:0 auto}
header{text-align:center;margin-bottom:22px}
.logo-wrap{display:inline-block;position:relative;padding:10px 20px 16px;transform:rotate(-1deg)}
.logo-burst{position:absolute;inset:0;background:linear-gradient(135deg,#60a5fa,#a78bfa,#facc15);border:5px solid #1f2937;border-radius:34px;transform:skew(-4deg) rotate(1deg);box-shadow:8px 8px 0 #1f2937;z-index:-1}
h1{font-size:clamp(2.3rem,6vw,4.8rem);margin:0;color:white;letter-spacing:-2px;line-height:.95;text-shadow:3px 3px 0 #1f2937,-2px 2px 0 #1f2937,2px -2px 0 #1f2937}
.speed-word{display:inline-block;color:#dbeafe;transform:rotate(-3deg) translateY(2px)}
.typer-word{display:inline-block;color:#fef08a;transform:rotate(2deg)}
.emoji-pop{display:inline-block;font-size:clamp(2rem,5vw,4rem);margin:0 6px;filter:drop-shadow(3px 3px 0 #1f2937);animation:wobble 1.4s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(6deg) scale(1.08)}}
.subtitle{margin-top:18px;font-size:1.2rem;color:#334155;font-weight:800;background:rgba(255,255,255,.9);display:inline-block;padding:8px 16px;border-radius:999px;border:3px solid #bfdbfe}
.main-card{background:rgba(255,255,255,.96);border:4px solid #dbeafe;border-radius:28px;padding:24px;box-shadow:0 18px 40px rgba(15,23,42,.14)}
.screen{display:none}.screen.active{display:block}
.instructions{font-size:1.05rem;line-height:1.5;color:#475569;text-align:center;max-width:800px;margin:12px auto;font-weight:700}
.choice-grid{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:16px;margin:24px 0}
.choice{touch-action:manipulation;border:4px solid #bfdbfe;border-radius:24px;background:white;padding:22px 14px;font-size:1.2rem;font-weight:900;color:#1e3a8a;cursor:pointer;box-shadow:0 8px 0 #bfdbfe;transition:.12s}
.choice:hover,.choice.selected{background:#fef3c7;border-color:#facc15;box-shadow:0 8px 0 #facc15;transform:translateY(-3px) rotate(-1deg)}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;align-items:center;justify-content:center}
button{touch-action:manipulation;border:0;border-radius:999px;padding:14px 22px;font-weight:800;font-size:1rem;cursor:pointer;transition:.08s}
button:active{transform:scale(.97)}
.primary{background:var(--red);color:white;font-size:1.15rem;padding:16px 28px}.primary:hover{transform:translateY(-2px) rotate(-1deg)}
.secondary{background:#e2e8f0;color:#334155}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat{background:#eff6ff;border:3px solid #bfdbfe;border-radius:18px;padding:14px;text-align:center;font-weight:900}
.stat-label{display:block;color:#64748b;font-size:.9rem;margin-bottom:4px}.stat-value{font-size:1.45rem;color:#1d4ed8}
.word-card{margin:20px 0;background:linear-gradient(135deg,#ecfeff,#fef3c7);border:4px solid #a5f3fc;border-radius:28px;padding:28px;text-align:center;box-shadow:0 10px 24px rgba(15,23,42,.08)}
.target-word{font-size:clamp(2.8rem,10vw,6rem);font-weight:900;letter-spacing:2px;color:#5b21b6;margin:0 0 18px}
input{width:min(620px,100%);font-size:2rem;text-align:center;font-weight:800;border:4px solid #bfdbfe;border-radius:22px;padding:16px;outline:none;background:#fff;color:var(--ink)}
input:focus{border-color:var(--blue);box-shadow:0 0 0 5px rgba(37,99,235,.15)}input.correct{border-color:#22c55e;background:#f0fdf4}input.wrong{border-color:#ef4444;background:#fff1f2}
.progress-wrap{margin-top:18px;background:#e2e8f0;border-radius:999px;overflow:hidden;height:24px;border:3px solid #cbd5e1}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);transition:width .2s}
.keyboard{margin-top:20px;background:linear-gradient(135deg,#eff6ff,#fff7ed);padding:16px;border-radius:24px;border:3px solid #bfdbfe}
.key-row{display:flex;justify-content:center;gap:7px;margin-bottom:8px;flex-wrap:nowrap}
.key{min-width:44px;height:44px;border-radius:12px;background:white;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-weight:900;text-transform:uppercase;box-shadow:0 4px 0 #cbd5e1;user-select:none;transition:.08s}
.key-row:nth-child(1) .key{border-color:#93c5fd;box-shadow:0 4px 0 #93c5fd}.key-row:nth-child(2) .key{border-color:#fde047;box-shadow:0 4px 0 #fde047}.key-row:nth-child(3) .key{border-color:#fca5a5;box-shadow:0 4px 0 #fca5a5}.key-row:nth-child(4) .key{border-color:#c4b5fd;box-shadow:0 4px 0 #c4b5fd}
.key.space{min-width:260px}.key.active{background:var(--green);border-color:#16a34a;color:white;transform:translateY(3px);box-shadow:0 1px 0 #15803d}
.result-box{background:linear-gradient(135deg,#ecfeff,#f5f3ff);border:4px solid #a5f3fc;border-radius:28px;padding:24px;text-align:center;margin-top:20px}.result-time{font-size:clamp(2.5rem,8vw,5rem);color:#5b21b6;font-weight:900;margin:0}.result-details{font-size:1.2rem;font-weight:800;color:#475569;margin-top:10px}.best-box{margin-top:16px;padding:14px;border-radius:18px;background:#fef3c7;border:3px solid #facc15;font-weight:900;color:#78350f}
@media(max-width:760px){body{padding:12px}.main-card{padding:16px}.choice-grid{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr}.key{min-width:30px;height:38px;font-size:.85rem}.key.space{min-width:150px}.keyboard{padding:10px}}

@media(max-width:520px){
  body{
    padding:10px;
    min-height:100svh;
  }

  header{
    margin-bottom:12px;
  }

  .logo-wrap{
    padding:8px 12px 12px;
    transform:none;
  }

  .logo-burst{
    border-width:4px;
    border-radius:24px;
    box-shadow:5px 5px 0 #1f2937;
  }

  h1{
    font-size:clamp(2rem,13vw,3.2rem);
    letter-spacing:-1px;
  }

  .emoji-pop{
    font-size:clamp(1.6rem,9vw,2.5rem);
    margin:0 2px;
  }

  .subtitle{
    font-size:.95rem;
    margin-top:12px;
    padding:7px 12px;
  }

  .main-card{
    padding:12px;
    border-radius:22px;
    border-width:3px;
  }

  .instructions{
    font-size:.95rem;
    margin:8px auto 12px;
  }

  .choice-grid{
    grid-template-columns:1fr;
    gap:10px;
    margin:14px 0;
  }

  .choice{
    padding:18px 12px;
    font-size:1.1rem;
    border-radius:20px;
    box-shadow:0 5px 0 #bfdbfe;
  }

  .choice:hover,.choice.selected{
    transform:none;
    box-shadow:0 5px 0 #facc15;
  }

  .stats{
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-bottom:10px;
  }

  .stat{
    padding:9px 5px;
    border-radius:14px;
    border-width:2px;
  }

  .stat-label{
    font-size:.72rem;
  }

  .stat-value{
    font-size:1rem;
  }

  .word-card{
    margin:10px 0;
    padding:16px 10px;
    border-radius:22px;
    border-width:3px;
  }

  .target-word{
    font-size:clamp(2.4rem,16vw,4.2rem);
    margin-bottom:12px;
    letter-spacing:1px;
    overflow-wrap:anywhere;
  }

  input{
    font-size:1.55rem;
    padding:13px 10px;
    border-radius:18px;
    border-width:3px;
  }

  .progress-wrap{
    height:18px;
    margin-top:12px;
    border-width:2px;
  }

  .actions{
    margin-top:10px;
  }

  button{
    width:100%;
    padding:14px 16px;
    font-size:1rem;
  }

  .keyboard{
    margin-top:12px;
    padding:8px;
    border-radius:18px;
    border-width:2px;
  }

  .key-row{
    gap:4px;
    margin-bottom:6px;
  }

  .key{
    min-width:0;
    flex:1;
    height:34px;
    border-radius:9px;
    font-size:.78rem;
    box-shadow:0 3px 0 #cbd5e1;
  }

  .key.space{
    flex:0 0 72%;
    min-width:0;
  }

  .result-box{
    padding:18px 12px;
    border-radius:22px;
    border-width:3px;
  }

  .result-time{
    font-size:clamp(2.4rem,16vw,4rem);
  }

  .result-details{
    font-size:1rem;
  }

  .best-box{
    font-size:.95rem;
    padding:12px;
  }
}

@media(max-width:380px){
  .stats{
    grid-template-columns:1fr;
  }

  .stat{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 12px;
  }

  .stat-label{
    margin:0;
  }

  .keyboard{
    display:none;
  }
}

</style>
</head>
<body>
<div class="game">
<header>
<div class="logo-wrap"><div class="logo-burst"></div><h1><span class="emoji-pop">⌨️</span><span class="speed-word">Speed</span> <span class="typer-word">Typer</span><span class="emoji-pop">⚡</span></h1></div>
<div style="width:100%;display:block;text-align:center;margin-top:18px;">
<p class="subtitle">Type 20 words as fast as you can!</p>
</div>
</header>
<main class="main-card">
<section class="screen active" id="startScreen"><p class="instructions">Choose your word level to start. Type each word exactly as it appears. Press space or Enter after each word.</p><div class="choice-grid"><button type="button" id="mode3" class="choice selected" data-level="3">3-letter words</button><button type="button" id="mode4" class="choice" data-level="4">4-letter words</button><button type="button" id="mode5" class="choice" data-level="5">5-letter words</button><button type="button" id="mode6" class="choice" data-level="6">6+ letter words</button></div></section>
<section class="screen" id="gameScreen"><div class="stats"><div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="timer">0.0s</span></div><div class="stat"><span class="stat-label">Word</span><span class="stat-value" id="progressText">1 / 20</span></div><div class="stat"><span class="stat-label">Mistakes</span><span class="stat-value" id="mistakes">0</span></div></div><div class="word-card"><p class="target-word" id="targetWord">ready</p><input id="typingInput" inputmode="text" enterkeyhint="done" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div></div><div class="actions"><button type="button" class="secondary" id="quitBtn">Back to menu</button></div><section class="keyboard" aria-label="On-screen keyboard"><div class="key-row" id="row1"></div><div class="key-row" id="row2"></div><div class="key-row" id="row3"></div><div class="key-row"><div class="key space" data-key=" ">space</div></div></section></section>
<section class="screen" id="resultScreen"><div class="result-box"><p class="result-time" id="finalTime">0.0s</p><div class="result-details" id="resultDetails"></div><div class="best-box" id="bestBox"></div></div><div class="actions"><button type="button" class="primary" id="playAgainBtn">Play again</button><button type="button" class="secondary" id="menuBtn">Choose another level</button></div></section>
</main></div>

<script>
window.onload = function () {
  var WORDS = {
    "3":["cat","dog","sun","run","hop","map","red","box","bug","mud","jam","pen","cup","hat","fox","pig","hen","log","web","zip","bat","cow","owl","ant","car","bus","bed","bag","egg","fan","gum","hug","ice","jar","key","leg","net","pot","rug","toy","van","wig","yak","zoo","bun","cap","dig","fun","jet","kit","lap","mix","nap","pin","ram","sit","tap","win","yes","pop"],
    "4":["frog","duck","bear","fish","bird","lion","goat","milk","cake","book","star","moon","tree","ship","sock","ball","jump","play","read","type","fast","slow","blue","pink","gold","rain","wind","snow","fire","king","ring","drum","bell","corn","pear","plum","bean","rice","sand","wave","road","park","door","desk","lamp","clap","spin","grin","flip","skip","bump","zoom","yell","joke","quiz","maze","word","line","page","kind","wild"],
    "5":["apple","tiger","zebra","snake","horse","mouse","panda","eagle","shark","whale","chair","table","happy","silly","funny","quick","brave","green","black","white","brown","cloud","storm","river","beach","music","drums","pizza","toast","grape","melon","lemon","mango","chips","sauce","dance","jumps","skate","slide","smile","laugh","magic","robot","alien","crown","train","plane","space","light","night","world","dream","story","words","timer"],
    "6":["banana","pickle","rocket","planet","school","library","typing","monkey","donkey","rabbit","turkey","dragon","wizard","castle","pirate","puppet","button","window","yellow","orange","purple","silver","circle","pencil","teacher","student","reading","writing","keyboard","sentence","computer","cupcake","noodles","spaghetti","dinosaur","kangaroo","platypus","crocodile","umbrella","backpack","trampoline","skateboard","lollipop","marshmallow","jellybean","sandwich","breakfast","football","playground","classroom","adventure","champion","challenge","fantastic","ridiculous","goblin","monster","unicorn","mermaid"]
  };

  var selectedLevel = "3";
  var currentWords = [];
  var currentIndex = 0;
  var mistakes = 0;
  var startTime = 0;
  var timerInterval = null;

  var startScreen = document.getElementById("startScreen");
  var gameScreen = document.getElementById("gameScreen");
  var resultScreen = document.getElementById("resultScreen");
  var choices = document.querySelectorAll(".choice");
  var timerDisplay = document.getElementById("timer");
  var progressText = document.getElementById("progressText");
  var mistakesDisplay = document.getElementById("mistakes");
  var targetWord = document.getElementById("targetWord");
  var typingInput = document.getElementById("typingInput");
  var progressBar = document.getElementById("progressBar");
  var finalTime = document.getElementById("finalTime");
  var resultDetails = document.getElementById("resultDetails");
  var bestBox = document.getElementById("bestBox");

  function showScreen(screen) {
    startScreen.classList.remove("active");
    gameScreen.classList.remove("active");
    resultScreen.classList.remove("active");
    screen.classList.add("active");
  }

  function buildKeyboard() {
    var rows = ["qwertyuiop", "asdfghjkl", "zxcvbnm"];
    for (var i = 0; i < rows.length; i++) {
      var row = document.getElementById("row" + (i + 1));
      row.innerHTML = "";
      for (var j = 0; j < rows[i].length; j++) {
        var letter = rows[i][j];
        var key = document.createElement("div");
        key.className = "key";
        key.setAttribute("data-key", letter);
        key.textContent = letter;
        row.appendChild(key);
      }
    }
  }

  function flashKey(k) {
    var normalised = String(k).toLowerCase();
    var keys = document.querySelectorAll(".key");
    for (var i = 0; i < keys.length; i++) {
      if (keys[i].getAttribute("data-key") === normalised) {
        keys[i].classList.add("active");
        (function(key) {
          setTimeout(function(){ key.classList.remove("active"); }, 160);
        })(keys[i]);
      }
    }
  }

  function shuffle(arr) {
    var copy = arr.slice();
    for (var i = copy.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = copy[i];
      copy[i] = copy[j];
      copy[j] = temp;
    }
    return copy;
  }

  function updateTimer() {
    var elapsed = (performance.now() - startTime) / 1000;
    timerDisplay.textContent = elapsed.toFixed(1) + "s";
  }

  function updateWord() {
    targetWord.textContent = currentWords[currentIndex];
    progressText.textContent = (currentIndex + 1) + " / 20";
    progressBar.style.width = ((currentIndex / 20) * 100) + "%";
  }

  function updateStats() {
    mistakesDisplay.textContent = mistakes;
  }

  function startGame() {
    currentWords = shuffle(WORDS[selectedLevel]).slice(0, 20);
    currentIndex = 0;
    mistakes = 0;
    startTime = performance.now();
    showScreen(gameScreen);
    typingInput.value = "";
    typingInput.classList.remove("correct");
    typingInput.classList.remove("wrong");
    updateWord();
    updateStats();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 100);
    setTimeout(function(){ typingInput.focus(); }, 50);
  }

  function submitTypedWord() {
    var typed = typingInput.value.trim().toLowerCase();
    var correct = currentWords[currentIndex].toLowerCase();
    if (!typed) return;

    if (typed === correct) {
      typingInput.classList.add("correct");
      typingInput.classList.remove("wrong");
      setTimeout(function () {
        currentIndex++;
        if (currentIndex >= 20) {
          finishGame();
          return;
        }
        typingInput.value = "";
        typingInput.classList.remove("correct");
        typingInput.classList.remove("wrong");
        updateWord();
      }, 80);
    } else {
      mistakes++;
      updateStats();
      typingInput.classList.add("wrong");
      typingInput.classList.remove("correct");
      setTimeout(function(){ typingInput.classList.remove("wrong"); }, 160);
    }
  }

  function finishGame() {
    clearInterval(timerInterval);
    var elapsed = (performance.now() - startTime) / 1000;
    var label = selectedLevel === "6" ? "6+ letter words" : selectedLevel + "-letter words";
    var bestKey = "speedTyperBest_" + selectedLevel;
    var previous = Number(localStorage.getItem(bestKey) || "0");
    var isBest = previous === 0 || elapsed < previous;
    if (isBest) localStorage.setItem(bestKey, elapsed.toFixed(2));
    finalTime.textContent = elapsed.toFixed(1) + "s";
    resultDetails.textContent = "You typed 20 " + label + " with " + mistakes + " mistake" + (mistakes === 1 ? "" : "s") + ".";
    bestBox.textContent = isBest ? "New personal best!" : "Personal best for this level: " + previous.toFixed(1) + "s";
    progressBar.style.width = "100%";
    showScreen(resultScreen);
  }

  function backToMenu() {
    clearInterval(timerInterval);
    showScreen(startScreen);
  }

  function chooseModeAndStart(level, button) {
    selectedLevel = level;
    for (var i = 0; i < choices.length; i++) {
      choices[i].classList.remove("selected");
    }
    if (button) {
      button.classList.add("selected");
    }
    setTimeout(function () {
      startGame();
    }, 80);
  }

  function attachModeButton(id, level) {
    var button = document.getElementById(id);
    if (!button) return;

    button.addEventListener("click", function (event) {
      event.preventDefault();
      chooseModeAndStart(level, button);
    });

    button.addEventListener("touchend", function (event) {
      event.preventDefault();
      chooseModeAndStart(level, button);
    }, { passive: false });
  }

  attachModeButton("mode3", "3");
  attachModeButton("mode4", "4");
  attachModeButton("mode5", "5");
  attachModeButton("mode6", "6");
  document.getElementById("quitBtn").onclick = backToMenu;
  document.getElementById("playAgainBtn").onclick = startGame;
  document.getElementById("menuBtn").onclick = backToMenu;

  typingInput.onkeydown = function (event) {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      submitTypedWord();
    }
  };

  typingInput.oninput = function () {
    var typed = typingInput.value.trim().toLowerCase();
    var correct = currentWords[currentIndex] ? currentWords[currentIndex].toLowerCase() : "";
    if (!typed) {
      typingInput.classList.remove("correct");
      typingInput.classList.remove("wrong");
    } else if (correct.indexOf(typed) === 0) {
      typingInput.classList.remove("wrong");
    } else {
      typingInput.classList.add("wrong");
    }
    if (typed === correct) submitTypedWord();
  };

  document.onkeydown = function (event) {
    if (!gameScreen.classList.contains("active")) return;
    if (event.key.length === 1 || event.key === " ") flashKey(event.key);
  };

  buildKeyboard();
};
</script>
</body>
</html>
